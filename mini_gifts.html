<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AMIRIZE - Мини-подарки</title>
    <link rel="stylesheet" href="picturies.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Контейнер сетки */
        .mini-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 30px;
            padding: 20px 0;
        }

        /* Карточка товара - теперь резиновая */
        .mini-card {
            display: flex;
            flex-direction: column;
            height: fit-content; /* подстраивается под контент */
            background: #fff;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease;
        }

        .mini-card:hover {
            transform: translateY(-5px);
        }

        /* Контейнер для картинки - теперь без фиксированной высоты */
        .mini-card .card-img {
            width: 100%;
            height: auto; /* высота подстраивается */
            aspect-ratio: 1/1; /* квадратные пропорции */
            overflow: hidden;
            background-color: #f5f5f5; /* фон на время загрузки */
        }

        .mini-card .card-img img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* картинка заполняет контейнер */
            object-position: center;
            display: block;
            transition: transform 0.5s ease;
        }

        .mini-card:hover .card-img img {
            transform: scale(1.05);
        }

        /* Информация под картинкой */
        .mini-card .card-info {
            padding: 15px 20px 20px;
            color: #000;
            display: flex;
            flex-direction: column;
            flex: 1;
        }

        .mini-card .card-title {
            font-size: 22px;
            font-weight: 600;
            margin-bottom: 5px;
        }

        .mini-card .card-price {
            font-size: 28px;
            font-weight: bold;
            color: #000;
            margin: 10px 0;
        }

        .mini-card .card-desc {
            font-size: 15px;
            color: #333;
            line-height: 1.5;
            margin-bottom: 15px;
            flex: 1;
        }

        .mini-card .card-id {
            color: #666;
            font-size: 13px;
            padding-top: 10px;
            border-top: 1px solid #eee;
            margin-bottom: 10px;
        }

        /* Кнопка копирования */
        .mini-card .copy-article-btn {
            width: 100%;
            padding: 10px;
            background-color: #f0f0f0;
            border: 1px solid #ddd;
            border-radius: 6px;
            color: #333;
            font-size: 14px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.3s ease;
            margin-top: 5px;
        }

        .mini-card .copy-article-btn:hover {
            background-color: #e0e0e0;
        }

        .mini-card .copy-article-btn.copied {
            background-color: #4CAF50;
            color: white;
            border-color: #45a049;
        }

        /* Адаптивность */
        @media (max-width: 1024px) {
            .mini-grid {
                gap: 25px;
            }
            
            .mini-card .card-title {
                font-size: 20px;
            }
            
            .mini-card .card-price {
                font-size: 24px;
            }
        }

        @media (max-width: 768px) {
            .mini-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }
            
            .mini-card .card-img {
                aspect-ratio: 16/9; /* на телефоне можно сделать пошире */
            }
            
            .mini-card .card-title {
                font-size: 22px;
            }
            
            .mini-card .card-price {
                font-size: 26px;
            }
            
            .mini-card .card-desc {
                font-size: 16px;
            }
        }

        @media (max-width: 480px) {
            .mini-card .card-img {
                aspect-ratio: 1/1; /* опять квадрат */
            }
            
            .mini-card .card-info {
                padding: 12px 15px 15px;
            }
            
            .mini-card .card-title {
                font-size: 20px;
            }
        }
    </style>
</head>
