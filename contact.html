<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Amirize</title>

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Bruno+Ace&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: sans-serif;
      color: #fff;
    }

    /* ВИДЕО */
    .video-bg {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: -2;
    }

    /* ЗАТЕМНЕНИЕ */
    .overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.6);
      z-index: -1;
    }

    /* КОНТЕЙНЕР */
    .wrapper {
      max-width: 1100px;
      padding: 40px;
      margin: 50px 150px 0 100px;
    }

    /* КОЛОНКА СЛЕВА */
    .column {
      max-width: 520px;
    }

    /* ЛОГО + ЗАГОЛОВОК */
    .header {
      display: flex;
      align-items: center;
      gap: 20px;
      margin-bottom: 30px;
    }

    .logo {
      width: 110px;
      height: 110px;
      border-radius: 50%;
      background: #fff;
    }

    .title {
      font-family: 'Bruno Ace', sans-serif;
      font-size: 32px;
      font-weight: 600;
    }

    .subtitle {
      font-size: 14px;
      opacity: 0.7;
    }

    /* КНОПКА */
    .btn {
      display: inline-block;
      margin-top: 15px;
      padding: 7px 62px;
      border: 1px solid #fff;
      border-radius: 8px;
      text-decoration: none;
      color: #fff;
      font-size: 14px;
      transition: 0.3s;
    }

    .btn:hover{
      border: 1px solid #fff;
      background-color: #fff;
      text-decoration: none;
      color: #000000;
      font-size: 14px;
      transition: 0.3s;
    }

    /* КАРТОЧКИ */
    .card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 16px;
      padding: 20px;
      margin-top: 20px;
      backdrop-filter: blur(6px);
    }

    .card-left {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .avatar {
      width: 50px;
      height: 50px;
      border-radius: 50%;
      background: #fff;
    }

    .card-title {
      font-family: 'Bruno Ace', sans-serif;
      font-size: 16px;
      margin-bottom: 5px;
    }

    .card-desc {
      font-size: 12px;
      opacity: 0.6;
    }

    .card-btn {
      border: 1px solid #fff;
      padding: 9px 40px;
      border-radius: 8px;
      font-size: 12px;
      text-decoration: none;
      color: #fff;
      transition: 0.3s;
    }
    .card-btn:hover {
      color: #000000;
      background-color: #fff;
      transition: 0.3s;
    }

    /* НИЖНИЕ БЛОКИ */
    .bottom {
      display: flex;
      gap: 20px;
      margin-top: 20px;
    }

    .small-card {
      flex: 1;
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 12px;
      padding: 15px;
      font-size: 14px;
      backdrop-filter: blur(6px);
    }
  </style>
</head>
<body>

  <!-- Видео -->
  <video class="video-bg" autoplay muted loop playsinline>
    <source src="video.mp4" type="video/mp4">
  </video>

  <!-- Затемнение -->
  <div class="overlay"></div>

  <!-- Контейнер -->
  <div class="wrapper">
    <div class="column">

      <!-- Header -->
      <div class="header">
        <div class="logo"></div>
        <img src="logo.jpg" alt="">
        <div>
          <div class="title">AMIRIZE</div>
          <div class="subtitle">подарки, которые хочется дарить</div>
          <a href="index.html" class="btn">За покупками</a>
        </div>
      </div>

      <!-- Карточка 1 -->
      <div class="card">
        <div class="card-left">
          <div class="avatar"></div>
          <div>
            <div class="card-title">Telegram - канал</div>
            <div class="card-desc">Порадуйте дорогих вам людей, подарив им...</div>
          </div>
        </div>
        <a href="https://t.me/amiRizeSHop" class="card-btn">Перейти</a>
      </div>

      <!-- Карточка 2 -->
      <div class="card">
        <div class="card-left">
          <div class="avatar"></div>
          <div>
            <div class="card-title">Чат с отзывами</div>
            <div class="card-desc">Описание добавишь сама</div>
          </div>
        </div>
        <a href="https://t.me/+JtETO2HJhqA5OTIy" class="card-btn">Перейти</a>
      </div>

      <div class="card">
        <div class="card-left">
          <div class="avatar"></div>
          <div>
            <div class="card-title">Мастер</div>
            <div class="card-desc">Свяжитесь напрямую для заказа</div>
          </div>
        </div>
        <a href="t.me/uuu_iyp" class="card-btn">Написать</a>
      </div>

      <!-- Низ -->
      <div class="bottom">
        <div class="small-card">Amirize.shop@mail.ru</div>
        <div class="small-card">+7 (932) 428-12-11</div>
      </div>

    </div>
  </div>

</body>
</html>
